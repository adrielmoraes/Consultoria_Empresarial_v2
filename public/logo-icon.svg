<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Dark Theme Gold Logo for Hive Mind -->
  <defs>
    <!-- Gold Gradient Principal -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE180" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#B08D24" />
      <stop offset="100%" stop-color="#735A12" />
    </linearGradient>

    <!-- Deep Inner Shadow/Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagon Base (Colmeia / Hive) -->
  <path 
    d="M256 32 L464 152 V392 L256 512 L48 392 V152 Z" 
    fill="url(#goldMain)" 
    fill-opacity="0.1" 
    stroke="url(#goldMain)" 
    stroke-width="12" 
    stroke-linejoin="round"
  />

  <!-- Inner Brain / Abstract Network Nodes -->
  <g filter="url(#glow)">
    <path 
      d="M256 128 L368 192 L368 320 L256 384 L144 320 L144 192 Z" 
      fill="url(#goldMain)" 
      fill-opacity="0.25"
      stroke="url(#goldMain)" 
      stroke-width="8" 
      stroke-linejoin="round"
    />
    
    <circle cx="256" cy="128" r="16" fill="#FFE180" />
    <circle cx="368" cy="192" r="16" fill="#D4AF37" />
    <circle cx="368" cy="320" r="16" fill="#B08D24" />
    <circle cx="256" cy="384" r="16" fill="#735A12" />
    <circle cx="144" cy="320" r="16" fill="#B08D24" />
    <circle cx="144" cy="192" r="16" fill="#D4AF37" />
    
    <!-- Connectivity lines representing the Multi-Agent Network -->
    <path d="M256 144 L256 368" stroke="url(#goldMain)" stroke-width="6" />
    <path d="M158 200 L354 312" stroke="url(#goldMain)" stroke-width="6" />
    <path d="M158 312 L354 200" stroke="url(#goldMain)" stroke-width="6" />
    
    <!-- Central AI Core -->
    <circle cx="256" cy="256" r="32" fill="url(#goldMain)" />
    <circle cx="256" cy="256" r="12" fill="#1A1A1A" />
  </g>
</svg>
