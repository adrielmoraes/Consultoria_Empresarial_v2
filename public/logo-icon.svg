<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">

  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E28B" />
      <stop offset="30%" stop-color="#FCEABB" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#A57910" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal honeycomb grid (brain left hemisphere) -->
  <g transform="translate(10, 10)">
    <polygon points="120.68,55.00 138.00,65.00 138.00,85.00 120.68,95.00 103.36,85.00 103.36,65.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="120.68,85.00 138.00,95.00 138.00,115.00 120.68,125.00 103.36,115.00 103.36,95.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="120.68,115.00 138.00,125.00 138.00,145.00 120.68,155.00 103.36,145.00 103.36,125.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="120.68,145.00 138.00,155.00 138.00,175.00 120.68,185.00 103.36,175.00 103.36,155.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="86.04,70.00 103.36,80.00 103.36,100.00 86.04,110.00 68.72,100.00 68.72,80.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="86.04,100.00 103.36,110.00 103.36,130.00 86.04,140.00 68.72,130.00 68.72,110.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="86.04,130.00 103.36,140.00 103.36,160.00 86.04,170.00 68.72,160.00 68.72,140.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="86.04,160.00 103.36,170.00 103.36,190.00 86.04,200.00 68.72,190.00 68.72,170.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="51.40,85.00 68.72,95.00 68.72,115.00 51.40,125.00 34.08,115.00 34.08,95.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="51.40,115.00 68.72,125.00 68.72,145.00 51.40,155.00 34.08,145.00 34.08,125.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="51.40,145.00 68.72,155.00 68.72,175.00 51.40,185.00 34.08,175.00 34.08,155.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="16.76,100.00 34.08,110.00 34.08,130.00 16.76,140.00 -0.56,130.00 -0.56,110.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    <polygon points="16.76,130.00 34.08,140.00 34.08,160.00 16.76,170.00 -0.56,160.00 -0.56,140.00" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />

    <!-- Brain right hemisphere curve -->
    <path d="
      M 145, 60
      C 180, 55  200, 70  205, 90
      C 225, 95 230, 115  220, 130
      C 235, 145 220, 165 200, 165
      C 190, 185 165, 185 145, 175
      " 
      fill="none" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

    <!-- Brain stem -->
    <path d="M 145, 175 C 145, 180 160, 185 155, 195 L 150, 195 L 145, 190" fill="none" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

    <!-- Neural circuit connections -->
    <path d="M 145, 80 L 165, 80 L 175, 90 L 185, 90" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <circle cx="145" cy="80" r="3" fill="url(#gold)" filter="url(#glow)" />
    <circle cx="185" cy="90" r="5.5" fill="url(#gold)" filter="url(#glow)" />

    <path d="M 145, 105 L 175, 105 L 185, 95 L 195, 95" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <circle cx="145" cy="105" r="3" fill="url(#gold)" filter="url(#glow)" />
    <circle cx="195" cy="95" r="5.5" fill="url(#gold)" filter="url(#glow)" />

    <path d="M 145, 120 L 165, 120 L 175, 130 L 195, 130 L 205, 120 L 215, 120" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <circle cx="145" cy="120" r="3" fill="url(#gold)" filter="url(#glow)" />
    <circle cx="215" cy="120" r="5.5" fill="url(#gold)" filter="url(#glow)" />
    <circle cx="175" cy="130" r="5.5" fill="url(#gold)" filter="url(#glow)" />

    <path d="M 145, 145 L 185, 145 L 195, 155 L 210, 155" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <circle cx="145" cy="145" r="3" fill="url(#gold)" filter="url(#glow)" />
    <circle cx="210" cy="155" r="5.5" fill="url(#gold)" filter="url(#glow)" />

    <path d="M 145, 165 L 165, 165 L 175, 155" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <circle cx="145" cy="165" r="3" fill="url(#gold)" filter="url(#glow)" />
    <circle cx="175" cy="155" r="5.5" fill="url(#gold)" filter="url(#glow)" />
  </g>

</svg>
